# BBSim simulation config.
# These values define the initial universe for one deterministic run.

[seed]
phrase = "Dimas"
grid_size = 192
fluctuation_amplitude = 0.35
fluctuation_scale = 0.50
spectral_tilt = 0.965

[inflation]
strength = 0.72
duration = 0.68
smoothing = 0.85
# Legacy fallback; cinematic playback uses [time_director] below.
visual_duration_s = 8.0

[cosmology]
h0_gyr_inv = 0.069
omega_b = 0.049
omega_dm = 0.265
omega_lambda = 0.686
omega_r = 0.0001
omega_k = 0.0

[early_universe]
# Legacy fallbacks; cinematic playback uses [time_director] below.
reheating_visual_duration_s = 6.0
nucleosynthesis_visual_duration_s = 6.0
recombination_visual_duration_s = 7.0

[time_director]
# quick / cinematic / deep. Duration scale multiplies all screen durations.
mode = "cinematic"
duration_scale = 1.0
personal_seed_visual_duration_s = 12.0
inflation_visual_duration_s = 38.0
reheating_visual_duration_s = 28.0
nucleosynthesis_visual_duration_s = 28.0
recombination_visual_duration_s = 38.0

[scale]
# Size of the displayed comoving patch at a = 1.
# Used only for human-readable scale overlays; it does not change physics yet.
box_size_today_mpc = 1000.0
show_scale_overlay = true

[structure]
gravity_strength = 1.0
baryon_infall = 0.8
gas_pressure = 0.3
cooling_efficiency = 0.55
star_formation_efficiency = 0.45
feedback_strength = 0.40
metal_yield = 0.25
black_hole_efficiency = 0.15
